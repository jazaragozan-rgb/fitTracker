<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fitTracker</title>

  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/app.css">

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a7fb9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
</head>
<body>

<!-- ══════════════ HEADER ══════════════ -->
<header>
  <div id="headerGreeting">
    <div class="dashboard-welcome">¡Hola, <span id="headerUserName">User</span>!</div>
    <div class="dashboard-subtitle">Vamos por una nueva meta hoy.</div>
  </div>
  <div id="headerAvatar">FT</div>
  <button id="logoutButton">
    <img src="iconos/Power.png" alt="Cerrar sesión">
  </button>
</header>

<!-- ══════════════ SUBHEADER ══════════════ -->
<div id="subHeader">
  <h2 id="tituloNivel">Dashboard</h2>
  <div id="subHeaderButtons"></div>
</div>

<!-- ══════════════ APP ══════════════ -->
<section id="app" class="hidden"></section>

<div id="contenidoWrapper">
  <div id="contenidoSwipe">
    <main id="contenido"></main>
  </div>
</div>

<div id="timerContainer"></div>

<!-- ══════════════ FOOTER ══════════════ -->
<footer id="footerNav">
  <button class="footer-btn" data-seccion="dashboard">
    <img src="iconos/Dashboard.svg" alt="Dashboard">
    <span class="footer-label">Dashboard</span>
  </button>
  <button class="footer-btn" data-seccion="entrenamiento">
    <img src="iconos/Entrenamiento.svg" alt="Entrenamiento">
    <span class="footer-label">Entrenamiento</span>
  </button>
  <button class="footer-btn" data-seccion="progreso">
    <img src="iconos/Progreso.svg" alt="Progreso">
    <span class="footer-label">Progreso</span>
  </button>
  <button class="footer-btn" data-seccion="nutricion">
    <img src="iconos/Nutricion.svg" alt="Nutrición">
    <span class="footer-label">Nutrición</span>
  </button>
  <button class="footer-btn" data-seccion="mas">
    <img src="iconos/Mas.svg" alt="Más">
    <span class="footer-label">Más</span>
  </button>
</footer>

<!-- ══════════════ SCRIPTS ══════════════ -->
<script type="module">
  import { init as initRouter, renderizar } from './core/router.js';
  import { onDatosLoaded }                  from './core/store.js';
  import { restaurarTimer }                 from './shared/timer.js';

  document.addEventListener('DOMContentLoaded', () => {
    initRouter();

    onDatosLoaded(() => {
      renderizar();
      restaurarTimer();
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => { reg.update(); })
        .catch(err => console.error('[PWA] Error SW:', err));
      navigator.serviceWorker.addEventListener('message', e => {
        if (e.data?.type === 'SW_UPDATED') window.location.reload();
      });
    }
  });
</script>

</body>
</html>
