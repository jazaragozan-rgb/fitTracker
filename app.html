<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fitTracker</title>

  <!-- ✅ 3 archivos CSS en lugar de 8 -->
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/app.css">

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a7fb9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">

  <!-- Chart.js para gráficos del dashboard y seguimiento -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
</head>
<body>

<!-- ══════════════ HEADER ══════════════ -->
<header>
  <button id="menuButton">
    <span></span>
    <span></span>
  </button>
  <div id="headerLogo">
    <img src="imagenes/logo.png" alt="fitTracker">
  </div>
  <button id="logoutButton">
    <img src="iconos/Power.png" alt="Cerrar sesión">
  </button>
</header>

<!-- ══════════════ SUBHEADER ══════════════ -->
<div id="subHeader">
  <h2 id="tituloNivel">Dashboard</h2>
  <div id="subHeaderButtons">
    <button id="backButton" class="header-btn">←</button>
    <button id="addButton"  class="header-btn">+ Añadir</button>
  </div>
</div>

<!-- ══════════════ SIDE MENU ══════════════ -->
<div id="menuOverlay" class="hidden"></div>
<nav id="sideMenu" class="sideMenu">
  <header1 id="header1">
    <h2 id="logomenulateral">
      <img src="imagenes/logo.png" alt="fitTracker">
      <span style="font-weight:lighter;">fit</span><span style="font-weight:bold;color:rgb(26,127,185);">Tracker</span>
    </h2>
  </header1>
  <button class="sideMenu-btn" data-seccion="dashboard">Dashboard</button>
  <button class="sideMenu-btn" data-seccion="entrenamiento">Entrenamiento</button>
  <button class="sideMenu-btn" data-seccion="seguimiento">Seguimiento</button>
  <button class="sideMenu-btn" data-seccion="calendario">Calendario</button>
  <button class="sideMenu-btn" data-seccion="nutricion">Nutrición</button>
</nav>

<!-- ══════════════ APP ══════════════ -->
<section id="app" class="hidden"></section>

<div id="contenidoWrapper">
  <div id="contenidoSwipe">
    <main id="contenido"></main>
  </div>
</div>

<div id="timerContainer"></div>

<!-- ══════════════ FOOTER ══════════════ -->
<footer id="footerNav">
  <button id="navHome" class="footer-btn">
    <img src="iconos/Home.png" alt="Inicio">
  </button>
  <button id="navSettings" class="footer-btn">
    <img src="iconos/Settings.png" alt="Ajustes">
  </button>
</footer>

<!-- ══════════════ SCRIPTS ══════════════ -->
<!--
  ORDEN DE CARGA:
  1. core/firebase.js  — config Firebase
  2. core/auth.js      — login/logout (verifica sesión)
  3. core/store.js     — estado global + Firestore
  4. core/router.js    — navegación
  5. script.js         — lógica de entrenamiento (nivel 4, drag&drop...)
                         Se mantiene mientras se migra completamente.
-->
<script type="module">
  import { init as initRouter, renderizar } from './core/router.js';
  import { onDatosLoaded }                  from './core/store.js';
  import { restaurarTimer }                 from './shared/timer.js';

  document.addEventListener('DOMContentLoaded', () => {
    initRouter();

    onDatosLoaded(() => {
      renderizar();
      restaurarTimer();
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => { reg.update(); })
        .catch(err => console.error('[PWA] Error SW:', err));
      navigator.serviceWorker.addEventListener('message', e => {
        if (e.data?.type === 'SW_UPDATED') window.location.reload();
      });
    }
  });
</script>

<!-- script.js legacy: maneja nivel 4, drag&drop, buscador de ejercicios -->
<!-- Se puede eliminar una vez esos bloques se migren a modules/entrenamiento/ -->
<script type="module" src="script.js"></script>

</body>
</html>
